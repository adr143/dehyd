<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sensor History Table</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gray-100 text-gray-900 p-4 md:p-10">
  <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">
    
    <div class="p-6 border-b border-gray-200 bg-indigo-700 text-white">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <h1 class="text-2xl font-bold">Records History</h1>
        <div class="flex space-x-2">
          <a href="/" class="px-4 py-2 bg-white/20 hover:bg-white/30 rounded-lg transition text-sm">Dashboard</a>
          <button onclick="downloadCSV()" class="px-4 py-2 bg-green-500 hover:bg-green-600 rounded-lg transition text-sm">CSV</button>
          <button onclick="resetDatabase()" class="px-4 py-2 bg-red-500 hover:bg-red-600 rounded-lg transition text-sm">Reset</button>
        </div>
      </div>
    </div>

    <div class="p-4 bg-gray-50 border-b flex flex-wrap gap-4 items-end">
      <div class="flex-1 min-w-[200px]">
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Search Fish</label>
        <input type="text" id="nameFilter" onkeyup="filterTable()" placeholder="Filter by name..." 
               class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">From Date</label>
        <input type="date" id="dateStart" onchange="filterTable()" 
               class="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">To Date</label>
        <input type="date" id="dateEnd" onchange="filterTable()" 
               class="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>
      <button onclick="clearFilters()" class="px-4 py-2 text-indigo-600 hover:underline text-sm font-medium">Clear</button>
    </div>

    <div class="overflow-x-auto">
      <table id="recordsTable" class="w-full text-left border-collapse">
        <thead class="bg-gray-100 text-gray-600 uppercase text-xs font-bold">
          <tr>
            <th class="p-4 border-b">DateTime</th>
            <th class="p-4 border-b">Fish Name</th>
            <th class="p-4 border-b text-center">Temp</th>
            <th class="p-4 border-b text-center">Humidity</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          {% for record in records %}
          <tr class="record-row hover:bg-indigo-50/30 transition">
            <td class="p-4 text-sm text-gray-500 date-cell">{{ record.datetime.strftime('%Y-%m-%d %H:%M:%S') }}</td>
            <td class="p-4 font-semibold name-cell">{{ record.fishname }}</td>
            <td class="p-4 text-center"><span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-sm font-bold">{{ record.temperature }}°C</span></td>
            <td class="p-4 text-center"><span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-sm font-bold">{{ record.humidity }}%</span></td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <div id="noResults" class="hidden p-10 text-center text-gray-400 italic">
        No records match your filters.
    </div>
  </div>

  <script>
    function filterTable() {
      const nameQuery = document.getElementById('nameFilter').value.toLowerCase();
      const startDate = document.getElementById('dateStart').value;
      const endDate = document.getElementById('dateEnd').value;
      const rows = document.querySelectorAll('.record-row');
      let visibleCount = 0;

      rows.forEach(row => {
        const name = row.querySelector('.name-cell').innerText.toLowerCase();
        const fullDateStr = row.querySelector('.date-cell').innerText; // YYYY-MM-DD HH:MM:SS
        const rowDate = fullDateStr.split(' ')[0]; // Extract YYYY-MM-DD

        const matchesName = name.includes(nameQuery);
        const matchesStart = !startDate || rowDate >= startDate;
        const matchesEnd = !endDate || rowDate <= endDate;

        if (matchesName && matchesStart && matchesEnd) {
          row.style.display = "";
          visibleCount++;
        } else {
          row.style.display = "none";
        }
      });

      document.getElementById('noResults').classList.toggle('hidden', visibleCount > 0);
    }

    function clearFilters() {
      document.getElementById('nameFilter').value = '';
      document.getElementById('dateStart').value = '';
      document.getElementById('dateEnd').value = '';
      filterTable();
    }

    function downloadCSV() {
      let csv = ["DateTime,Fish Name,Temperature(C),Humidity(%)"];
      const rows = document.querySelectorAll(".record-row");
      
      rows.forEach(row => {
        if (row.style.display !== "none") {
          const cells = row.querySelectorAll("td");
          const data = Array.from(cells).map(c => `"${c.innerText.replace(/[°C%]/g, '').trim()}"`);
          csv.push(data.join(","));
        }
      });

      const csvBlob = new Blob([csv.join("\n")], { type: "text/csv" });
      const url = window.URL.createObjectURL(csvBlob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `fish_data_export.csv`;
      a.click();
    }

    async function resetDatabase() {
      if (confirm("Permanently delete all records?")) {
        const res = await fetch('/reset_db', { method: 'POST' });
        if ((await res.json()).success) location.reload();
      }
    }
  </script>
</body>
</html>
