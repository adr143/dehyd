<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Raspberry Pi Heater Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-gray-100 text-gray-900">
  <div class="max-w-lg mx-auto mt-10 p-6 bg-white rounded-2xl shadow-lg text-center">
    <h1 class="text-3xl font-bold mb-6 text-indigo-700">Heater Control Dashboard</h1>

    <!-- Sensor Readings -->
    <div class="grid grid-cols-2 gap-4 mb-8">
      <div class="p-4 bg-indigo-50 rounded-lg shadow">
        <h2 class="text-xl font-semibold text-indigo-600">Temperature</h2>
        <p id="temp" class="text-3xl font-bold mt-2">{{ data.temperature or "N/A" }}°C</p>
      </div>
      <div class="p-4 bg-blue-50 rounded-lg shadow">
        <h2 class="text-xl font-semibold text-blue-600">Humidity</h2>
        <p id="hum" class="text-3xl font-bold mt-2">{{ data.humidity or "N/A" }}%</p>
      </div>
    </div>

    <div class="p-4 bg-blue-50 rounded-lg shadow">
        <h2 class="text-xl font-semibold text-blue-600">Fish Name</h2>
        <input type="text" id="fishName"><br>
        <p id="fish" class="text-3xl font-bold mt-2">{{ data.fishname}}</p>
        <button id="changeFish" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow">Change Fish</button>
    </div>

    <!-- Relay Controls -->
    <div class="space-y-6">
      <div>
        <h2 class="text-xl font-semibold mb-2">Heater Lamp</h2>
        <div class="flex justify-center space-x-4">
          <button id="lampOn" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg shadow">Turn ON</button>
          <button id="lampOff" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg shadow">Turn OFF</button>
        </div>
      </div>

      <div>
        <h2 class="text-xl font-semibold mb-2">Heater Fan</h2>
        <div class="flex justify-center space-x-4">
          <button id="fanOn" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg shadow">Turn ON</button>
          <button id="fanOff" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg shadow">Turn OFF</button>
        </div>
      </div>
    </div>

    <!-- Status Section -->
    <div class="mt-8 p-3 bg-gray-50 rounded-xl text-sm text-gray-600">
      <p><b>Lamp:</b> <span id="lampStatus">{{ 'OFF' if data.heater_lamp else 'ON' }}</span></p>
      <p><b>Fan:</b> <span id="fanStatus">{{ 'OFF' if data.heater_fan else 'ON' }}</span></p>
    </div>
  </div>

  <script>
    async function updateData() {
      const res = await fetch('/data');
      const json = await res.json();
      document.getElementById('temp').textContent = `${json.temperature}°C` ?? "N/A";
      document.getElementById('hum').textContent = `${json.humidity}%` ?? "N/A";
      document.getElementById('lampStatus').textContent = json.heater_lamp ? "OFF" : "ON";
      document.getElementById('fanStatus').textContent = json.heater_fan ? "OFF" : "ON";
      document.getElementById('fish').textContent = json.fishname 
    }

    async function control(device, state) {
      await fetch('/control', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ device, state})
      });
      updateData();
    }

    async function change_fish(fishname) {
      await fetch('/change_fish', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ fishname})
      });
      document.getElementById('fish').textContent = fishname
      updateData();
    }

    document.getElementById('lampOn').onclick = () => control('lamp',false)
    document.getElementById('lampOff').onclick = () => control('lamp',true)
    document.getElementById('fanOn').onclick = () => control('fan',false)
    document.getElementById('fanOff').onclick = () => control('fan', true)
    document.getElementById('changeFish').onclick = () => change_fish(document.getElementById('fishName').value)

    setInterval(updateData, 2000);
  </script>
</body>
</html>
